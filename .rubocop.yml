inherit_gem:
  rubocop-config-captive:
    - config/default.yml

# Gem pure Ruby — pas de Rails runtime
Rails/Exit:
  Enabled: false

Rails/Output:
  Enabled: false

Rails/TimeZone:
  Enabled: false

Rails/Blank:
  Enabled: false

Rails/Present:
  Enabled: false

# Contextes RSpec en français
RSpec/ContextWording:
  Enabled: false

# Pas de contraintes de version sur les dépendances internes
Bundler/GemVersion:
  Enabled: false

Layout/LineLength:
  Max: 130
